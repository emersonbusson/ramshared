# RamShared: garante journal PERSISTENTE (sobrevive a reboot/wsl --shutdown) para
# que o coletor postmortem sempre tenha o `journalctl -b -1` do boot que travou.
# Sem isto, um journald volatil perderia a evidencia do crash no restart.
# Instalado em /etc/systemd/journald.conf.d/10-ramshared-persistent.conf
[Journal]
Storage=persistent
SystemMaxUse=500M
